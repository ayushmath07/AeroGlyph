<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Fleet Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Drone Fleet Management System</h1>
            <div class="fleet-stats">
                <span>Total Drones: <strong id="totalDrones">50</strong></span>
                <span>Active: <strong id="activeDrones">0</strong></span>
                <span>Low Battery: <strong id="lowBattery">0</strong></span>
            </div>
        </header>

        <div class="main-content">
            <div class="canvas-container">
                <canvas id="droneCanvas"></canvas>
            </div>

            <div id="sidebar" class="sidebar">
                <button id="sidebarToggle" class="sidebar-toggle">
                    <span class="arrow">▶</span>
                </button>
                <div class="sidebar-content">
                    <h2>Drone Statistics</h2>
                    <div class="table-container">
                        <table id="droneTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Battery</th>
                                    <th>Altitude</th>
                                    <th>Speed</th>
                                    <th>Status</th>
                                    <th>Task</th>
                                    <th>Update</th>
                                </tr>
                            </thead>
                            <tbody id="droneTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="formation-controls">
                <h3>Formation Patterns</h3>
                <div class="button-group">
                    <button class="formation-btn active" data-formation="circle">Circle</button>
                    <button class="formation-btn" data-formation="square">Square</button>
                    <button class="formation-btn" data-formation="heart">Heart</button>
                    <button class="formation-btn" data-formation="star">Star</button>
                    <button class="formation-btn" data-formation="spiral">Spiral</button>
                    <button class="formation-btn" data-formation="hello">HELLO</button>
                </div>
            </div>

            <div class="system-controls">
                <h3>System Controls</h3>
                <div class="button-group">
                    <button id="batteryMode" class="control-btn">Battery Mode: OFF</button>
                    <button id="startStop" class="control-btn primary">Start Simulation</button>
                    <button id="resetBtn" class="control-btn">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
